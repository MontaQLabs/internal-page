<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MontaQ Labs — The Sanctum</title>
    <!-- Include Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ece9e6;
            --fg: #1a1a1a;
            --gold: #b08d57;
            --gold-light: #dfc8a5;
            --card-bg: rgba(255, 255, 255, 0.25);
            --card-border: rgba(255, 255, 255, 0.4);
            --text-muted: #555555;
            --font-serif: "Cormorant Garamond", serif;
            --font-sans: "Montserrat", sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: none; /* Hide default cursor for custom one */
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--font-sans);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
            selection-background: var(--gold);
            selection-color: #fff;
        }

        ::selection {
            background: var(--gold);
            color: #fff;
        }

        /* Cinematic Noise Overlay */
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        /* Custom Cursor */
        .cursor-dot,
        .cursor-outline {
            position: fixed;
            top: 0; left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 10000;
            pointer-events: none;
        }

        .cursor-dot {
            width: 6px;
            height: 6px;
            background-color: var(--gold);
        }

        .cursor-outline {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(176, 141, 87, 0.5);
            transition: width 0.2s, height 0.2s, background-color 0.2s;
            will-change: width, height, transform, border;
        }

        /* Canvas for Three.js background */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        .layout-wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px 4vw;
        }

        .glass-container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 80px 60px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255,255,255,0.6);
            transform: translateY(40px);
            opacity: 0;
            animation: containerReveal 1.5s cubic-bezier(0.19, 1, 0.22, 1) 0.2s forwards;
        }

        header {
            text-align: center;
            margin-bottom: 80px;
            position: relative;
        }

        .logo-container {
            margin-bottom: 40px;
            display: inline-block;
            position: relative;
        }

        .logo-img {
            max-height: 70px;
            width: auto;
            display: block;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .logo-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 150px; height: 150px;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
            z-index: 1;
            pointer-events: none;
        }

        h1 {
            font-family: var(--font-serif);
            font-size: 4vw;
            font-size: clamp(40px, 6vw, 72px);
            font-weight: 300;
            letter-spacing: 0.02em;
            margin-bottom: 24px;
            color: var(--fg);
            line-height: 1.1;
        }

        h1 i {
            font-style: italic;
            color: var(--gold);
        }

        .description {
            font-size: 16px;
            font-weight: 300;
            color: var(--text-muted);
            max-width: 500px;
            margin: 0 auto;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            perspective: 1000px; /* For 3D card tilt */
        }

        .tool-card-wrapper {
            opacity: 0;
            transform: translateY(30px);
            /* Handled by JS for staggered reveal */
        }

        .tool-card {
            display: block;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 35px;
            text-decoration: none;
            color: inherit;
            position: relative;
            transform-style: preserve-3d;
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02), inset 0 1px 0 rgba(255,255,255,0.8);
            overflow: hidden;
        }

        .tool-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(800px circle at var(--mouse-x) var(--mouse-y), rgba(255,255,255,0.6), transparent 40%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            z-index: 0;
        }

        .tool-card:hover {
            border-color: #fff;
            box-shadow: 0 20px 40px rgba(176, 141, 87, 0.15), inset 0 1px 0 rgba(255,255,255,1);
        }

        .tool-card:hover::before {
            opacity: 1;
        }

        .card-content {
            position: relative;
            z-index: 1;
            transform: translateZ(30px); /* Lift content off the card background */
            pointer-events: none;
        }

        .tool-name {
            font-family: var(--font-serif);
            font-size: 28px;
            font-weight: 400;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .tool-name span {
            display: inline-block;
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .tool-card:hover .tool-name span {
            transform: translateX(10px);
            color: var(--gold);
        }

        .tool-name .arrow {
            font-family: var(--font-sans);
            font-size: 18px;
            font-weight: 300;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            color: var(--gold);
        }

        .tool-card:hover .tool-name .arrow {
            opacity: 1;
            transform: translateX(0);
        }

        .tool-desc {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 300;
            line-height: 1.5;
        }

        .tag {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--gold);
            margin-top: 30px;
            display: inline-block;
            font-weight: 500;
            position: relative;
        }

        .tag::before {
            content: '';
            position: absolute;
            left: 0; bottom: -4px;
            width: 0%;
            height: 1px;
            background: var(--gold);
            transition: width 0.4s ease;
        }

        .tool-card:hover .tag::before {
            width: 100%;
        }

        footer {
            margin-top: 100px;
            text-align: center;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--text-muted);
            opacity: 0.6;
        }

        @keyframes containerReveal {
            from { opacity: 0; transform: translateY(60px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .glass-container { padding: 50px 24px; border-radius: 20px; }
            .tools-grid { grid-template-columns: 1fr; }
            .cursor-dot, .cursor-outline { display: none; }
            * { cursor: auto; }
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    
    <!-- Custom Cursor Elements -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <canvas id="bg-canvas"></canvas>

    <div class="layout-wrapper">
        <div class="glass-container">
            <header>
                <div class="logo-container">
                    <div class="logo-glow"></div>
                    <img src="montaq.png" alt="MontaQ Labs Logo" class="logo-img">
                </div>
                <h1>The <i>Sanctum</i></h1>
                <p class="description">Digital infrastructure for MontaQ Labs.</p>
            </header>

            <div class="tools-grid">
                <!-- Cards will be populated by JS to handle staggering -->
                <script>
                    const tools = [
                        { name: "Mattermost", desc: "Digital presence and collaborative coordination.", tag: "Atelier", url: "https://chat.montaq.org" },
                        { name: "Vaultwarden", desc: "Encrypted vaults for institutional integrity.", tag: "Security", url: "https://vault.montaq.org" },
                        { name: "Vikunja", desc: "Orchestration of ambitious architectural goals.", tag: "Management", url: "https://project.montaq.org" },
                        { name: "Outline", desc: "The digital manuscript and knowledge base.", tag: "Archives", url: "https://wiki.montaq.org" },
                        { name: "Documenso", desc: "Formalizing agreements through digital signature.", tag: "Protocols", url: "https://sign.montaq.org" },
                        { name: "InvoiceShelf", desc: "Financial stewardship and fiscal reporting.", tag: "Treasury", url: "https://invoice.montaq.org" },
                        { name: "HedgeDoc", desc: "Spontaneous ideation and collaborative drafting.", tag: "Journal", url: "https://pad.montaq.org" },
                        { name: "n8n", desc: "Invisible automations and system harmony.", tag: "Mechanics", url: "https://n8n.montaq.org" },
                        { name: "Authentik", desc: "The gateway to the internal ecosystem.", tag: "Identity", url: "https://auth.montaq.org" },
                        { name: "Minio", desc: "Infinite object storage and distributed assets.", tag: "Storage", url: "https://s3.montaq.org" }
                    ];

                    const grid = document.querySelector('.tools-grid');
                    tools.forEach((tool, index) => {
                        const delay = 0.4 + (index * 0.1);
                        document.write(`
                            <div class="tool-card-wrapper" style="animation: cardReveal 1s cubic-bezier(0.19, 1, 0.22, 1) ${delay}s forwards;">
                                <a href="${tool.url}" class="tool-card" data-tilt>
                                    <div class="card-content">
                                        <div class="tool-name">
                                            <span>${tool.name}</span>
                                            <div class="arrow">↗</div>
                                        </div>
                                        <p class="tool-desc">${tool.desc}</p>
                                        <div class="tag">${tool.tag}</div>
                                    </div>
                                </a>
                            </div>
                        `);
                    });
                </script>
            </div>

            <footer>
                MMXXVI &copy; MontaQ Labs
            </footer>
        </div>
    </div>

    <script>
        // --- Custom Cursor Logic ---
        const cursorDot = document.querySelector('.cursor-dot');
        const cursorOutline = document.querySelector('.cursor-outline');
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let outlineX = mouseX;
        let outlineY = mouseY;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            // Instantly move dot
            cursorDot.style.transform = `translate(${mouseX}px, ${mouseY}px) translate(-50%, -50%)`;
        });

        // Loop for smooth outline trailing
        function animateCursor() {
            let distX = mouseX - outlineX;
            let distY = mouseY - outlineY;
            
            outlineX += distX * 0.15;
            outlineY += distY * 0.15;
            
            cursorOutline.style.transform = `translate(${outlineX}px, ${outlineY}px) translate(-50%, -50%)`;
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // Cursor hover states
        document.querySelectorAll('a, .logo-container').forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursorOutline.style.width = '60px';
                cursorOutline.style.height = '60px';
                cursorOutline.style.backgroundColor = 'rgba(255,255,255,0.1)';
                cursorOutline.style.backdropFilter = 'blur(4px)';
            });
            el.addEventListener('mouseleave', () => {
                cursorOutline.style.width = '40px';
                cursorOutline.style.height = '40px';
                cursorOutline.style.backgroundColor = 'transparent';
                cursorOutline.style.backdropFilter = 'none';
            });
        });


        // --- 3D Card Tilt Effect ---
        const cards = document.querySelectorAll('.tool-card');
        
        cards.forEach(card => {
            card.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left; // x position within the element.
                const y = e.clientY - rect.top;  // y position within the element.
                
                // For radial gradient background
                card.style.setProperty('--mouse-x', `${x}px`);
                card.style.setProperty('--mouse-y', `${y}px`);

                // Calculate tilt
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                const rotateX = ((y - centerY) / centerY) * -8; // Max rotation 8 deg
                const rotateY = ((x - centerX) / centerX) * 8;
                
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
            });
            
            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateX(0) rotateY(0) scale3d(1, 1, 1)`;
                card.style.transition = 'transform 0.5s cubic-bezier(0.23, 1, 0.32, 1)';
            });

            card.addEventListener('mouseenter', () => {
                card.style.transition = 'none'; // remove transition for snappy follow
            });
        });


        // --- High-End Three.js Background ---
        const canvas = document.querySelector('#bg-canvas');
        const scene = new THREE.Scene();
        // Very soft, warm atmospheric background
        scene.fog = new THREE.FogExp2(0xece9e6, 0.015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 12);

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // optimize performance
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        // Beautiful golden hour directional light
        const dirLight = new THREE.DirectionalLight(0xffeedd, 2.5);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.1;
        dirLight.shadow.camera.far = 40;
        dirLight.shadow.bias = -0.0001;
        scene.add(dirLight);

        // Fill light to soften shadows (blueish to contrast the gold)
        const fillLight = new THREE.DirectionalLight(0xddeeff, 1.0);
        fillLight.position.set(-5, 5, -5);
        scene.add(fillLight);

        // --- Materials ---
        // Ultra-premium frosted glass / translucent material for floating objects
        const glassMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            metalness: 0.1,
            roughness: 0.2,
            transmission: 0.9, // glass-like
            thickness: 1.5,
            clearcoat: 1.0,
            clearcoatRoughness: 0.1,
            ior: 1.5, // index of refraction
        });

        const goldMaterial = new THREE.MeshStandardMaterial({
            color: 0xd4af37,
            metalness: 1.0,
            roughness: 0.3,
        });

        const pedestalMaterial = new THREE.MeshStandardMaterial({
            color: 0xf5f5f5,
            roughness: 0.9,
            metalness: 0.05
        });

        // --- Geometry ---
        // The Floor
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floor = new THREE.Mesh(floorGeo, pedestalMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Floating Abstract Sculptures
        const objects = [];

        // 1. Center piece (Torus Knot)
        const torusGeo = new THREE.TorusKnotGeometry(2, 0.6, 128, 64);
        const torus = new THREE.Mesh(torusGeo, glassMaterial);
        torus.position.set(-4, 2, -5);
        torus.castShadow = true;
        scene.add(torus);
        objects.push({ mesh: torus, rotX: 0.002, rotY: 0.003, floatSpeed: 0.001, floatOffset: 0 });

        // 2. Elegant Sphere
        const sphereGeo = new THREE.SphereGeometry(1.5, 64, 64);
        const sphere = new THREE.Mesh(sphereGeo, goldMaterial);
        sphere.position.set(5, 1, -8);
        sphere.castShadow = true;
        scene.add(sphere);
        objects.push({ mesh: sphere, rotX: 0.005, rotY: 0.001, floatSpeed: 0.002, floatOffset: Math.PI });

        // 3. Floating Ring
        const ringGeo = new THREE.TorusGeometry(3, 0.1, 16, 100);
        const ring = new THREE.Mesh(ringGeo, goldMaterial);
        ring.position.set(-2, 3, -10);
        ring.rotation.x = Math.PI / 2;
        ring.castShadow = true;
        scene.add(ring);
        objects.push({ mesh: ring, rotX: 0.001, rotY: 0.004, floatSpeed: 0.0015, floatOffset: Math.PI/2 });

        // 4. Background Monoliths (Architectural)
        for(let i=0; i<3; i++) {
            const monoGeo = new THREE.BoxGeometry(2, 10 + Math.random()*5, 2);
            const mono = new THREE.Mesh(monoGeo, pedestalMaterial);
            mono.position.set(
                (Math.random() - 0.5) * 20,
                0,
                -15 - Math.random() * 5
            );
            mono.castShadow = true;
            mono.receiveShadow = true;
            scene.add(mono);
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        
        let targetCameraX = 0;
        let targetCameraY = 2;

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // Parallax camera movement based on mouse
            targetCameraX = (mouseX / window.innerWidth - 0.5) * 4;
            targetCameraY = 2 - (mouseY / window.innerHeight - 0.5) * 2;

            camera.position.x += (targetCameraX - camera.position.x) * 0.05;
            camera.position.y += (targetCameraY - camera.position.y) * 0.05;
            camera.lookAt(0, 2, -5);

            // Animate Sculptures
            objects.forEach(obj => {
                obj.mesh.rotation.x += obj.rotX;
                obj.mesh.rotation.y += obj.rotY;
                // Floating up and down
                obj.mesh.position.y += Math.sin(time * 2 + obj.floatOffset) * obj.floatSpeed;
            });

            renderer.render(scene, camera);
        }
        
        animate();

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
