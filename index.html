<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MontaQ Labs / Systems</title>

    <!-- Core Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@100;300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #000;
            --text-color: #111;
            --font-serif: 'Playfair Display', serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-mono);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::selection {
            background: #111;
            color: #fff;
        }

        /* Cinematic Noise Overlay */
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 9998;
            opacity: 0.04;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        /* Custom Cursor */
        .cursor-dot {
            position: fixed; width: 6px; height: 6px; background: #000; border-radius: 50%;
            pointer-events: none; z-index: 10000; transform: translate(-50%, -50%);
        }
        .cursor-ring {
            position: fixed; width: 40px; height: 40px; border: 1px solid rgba(0,0,0,0.3);
            border-radius: 50%; pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%); transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1), height 0.4s cubic-bezier(0.16, 1, 0.3, 1), background 0.4s;
            will-change: transform;
        }

        /* WebGL Canvas */
        #glcanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        /* Loader */
        .loader {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #080808;
            color: #fff;
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .loader-percent {
            font-family: var(--font-serif);
            font-size: 12vw;
            font-weight: 400;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
        }

        /* Header Navigation */
        .nav-top {
            position: fixed;
            top: 0; left: 0; width: 100vw;
            padding: 3vw 4vw;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 100;
            pointer-events: none;
        }
        .nav-top * { pointer-events: auto; }
        .brand-logo {
            height: 28px;
            display: block;
        }
        .nav-meta {
            text-align: right;
            font-size: 0.7vw;
            line-height: 1.6;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 300;
        }

        /* Main Scroll Layout */
        .list-wrapper {
            position: relative;
            width: 60vw;
            padding-top: 35vh;
            padding-bottom: 35vh;
            padding-left: 10vw;
            z-index: 10;
        }

        .list-item {
            display: block;
            position: relative;
            padding: 4.5vh 0;
            text-decoration: none;
            color: var(--text-color);
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        .item-num {
            position: absolute;
            left: 0;
            top: 6vh;
            font-size: 0.85vw;
            opacity: 0.3;
            letter-spacing: 0.1em;
        }

        .item-title {
            font-family: var(--font-serif);
            font-size: 5vw;
            font-weight: 400;
            margin-left: 4vw;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease, color 0.6s;
            transform-origin: left center;
            letter-spacing: -0.01em;
        }

        .list-item:hover .item-title {
            transform: translateX(3vw);
            font-style: italic;
        }

        .list-wrapper:hover .list-item:not(:hover) .item-title {
            opacity: 0.15;
        }

        /* Fixed Detail Panel */
        .fixed-detail {
            position: fixed;
            right: 8vw;
            top: 50%;
            transform: translateY(-50%);
            width: 22vw;
            display: flex;
            flex-direction: column;
            gap: 2.5vh;
            z-index: 10;
            pointer-events: none;
        }

        .detail-label {
            font-size: 0.65vw;
            letter-spacing: 0.2em;
            color: rgba(0,0,0,0.4);
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 1.5vh;
        }

        .detail-text {
            font-size: 1.1vw;
            line-height: 1.6;
            font-weight: 300;
            min-height: 10vh;
        }
        
        .dull {
            opacity: 0.3; /* Used for the scramble effect */
        }

        .launch-btn {
            align-self: flex-start;
            display: inline-flex;
            align-items: center;
            gap: 0.5vw;
            font-size: 0.75vw;
            color: #fff;
            background: #000;
            padding: 1.5vh 2vw;
            border-radius: 50px;
            text-decoration: none;
            opacity: 0;
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), background 0.3s;
            pointer-events: auto;
            letter-spacing: 0.1em;
        }

        .launch-btn:hover {
            transform: scale(1.05);
            background: #222;
        }

        @media (max-width: 768px) {
            .cursor-dot, .cursor-ring { display: none !important; }
            * { cursor: auto !important; }
            .nav-meta { font-size: 10px; }
            .fixed-detail { display: none; }
            .list-wrapper { width: 100vw; padding-left: 6vw; padding-right: 6vw; padding-top: 20vh; }
            .item-title { font-size: 10vw; margin-left: 8vw; }
            .item-num { font-size: 3vw; top: 5.5vh; }
            .list-item:hover .item-title { transform: translateX(2vw); }
            .brand-logo { height: 20px; }
        }
    </style>
</head>
<body>

    <!-- Overlays -->
    <div class="noise"></div>
    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>

    <!-- WebGL Background -->
    <canvas id="glcanvas"></canvas>

    <!-- Intro Loader -->
    <div class="loader">
        <div class="loader-percent">000</div>
    </div>

    <!-- Interface -->
    <nav class="nav-top">
        <img src="montaq.png" alt="MontaQ Labs" class="brand-logo"/>
        <div class="nav-meta">
            <div>SYS.OP / 01</div>
            <div>RESTRICTED ACCESS</div>
        </div>
    </nav>

    <!-- Scrollable List -->
    <div class="list-wrapper" id="list-wrapper">
        <!-- Injected via JS -->
    </div>

    <!-- Contextual Details -->
    <div class="fixed-detail" id="fixed-detail">
        <div class="detail-label">DESCRIPTION / MODULE</div>
        <div class="detail-text" id="desc-text">Initiate sequence to explore internal modules.</div>
        <a href="#" id="launch-btn" class="launch-btn" target="_blank">LAUNCH MODULE ↗</a>
    </div>

    <script>
        /* =========================================
           DATA & CONSTANTS
        ========================================= */
        const tools = [
            { name: "Mattermost", desc: "Real-time team communication and engineering coordination.", url: "https://chat.montaq.org" },
            { name: "Vaultwarden", desc: "End-to-end encrypted credential and secret management.", url: "https://vault.montaq.org" },
            { name: "Vikunja", desc: "Advanced project tracking and task orchestration.", url: "https://project.montaq.org" },
            { name: "Outline", desc: "Internal documentation and knowledge base.", url: "https://wiki.montaq.org" },
            { name: "Documenso", desc: "Open-source digital document signing infrastructure.", url: "https://sign.montaq.org" },
            { name: "InvoiceShelf", desc: "Financial management and invoicing platform.", url: "https://invoice.montaq.org" },
            { name: "HedgeDoc", desc: "Collaborative real-time markdown editor for brainstorming.", url: "https://pad.montaq.org" },
            { name: "n8n", desc: "Workflow automation and system interconnectivity.", url: "https://n8n.montaq.org" },
            { name: "Authentik", desc: "Identity provider and unified Single Sign-On gateway.", url: "https://auth.montaq.org" },
            { name: "Minio", desc: "High-performance S3 compatible object storage.", url: "https://s3.montaq.org" }
        ];

        /* =========================================
           DOM INJECTION
        ========================================= */
        const listWrapper = document.getElementById('list-wrapper');
        tools.forEach((tool, index) => {
            const num = String(index + 1).padStart(2, '0');
            const a = document.createElement('a');
            a.href = tool.url;
            a.className = 'list-item';
            a.innerHTML = `
                <span class="item-num">${num}</span>
                <h2 class="item-title">${tool.name}</h2>
            `;
            listWrapper.appendChild(a);
        });

        /* =========================================
           CUSTOM CURSOR
        ========================================= */
        const dot = document.querySelector('.cursor-dot');
        const ring = document.querySelector('.cursor-ring');
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let ringX = mouseX;
        let ringY = mouseY;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            dot.style.transform = `translate(${mouseX}px, ${mouseY}px) translate(-50%, -50%)`;
        });

        function renderCursor() {
            ringX += (mouseX - ringX) * 0.15;
            ringY += (mouseY - ringY) * 0.15;
            ring.style.transform = `translate(${ringX}px, ${ringY}px) translate(-50%, -50%)`;
            requestAnimationFrame(renderCursor);
        }
        renderCursor();

        document.querySelectorAll('a').forEach(el => {
            el.addEventListener('mouseenter', () => {
                ring.style.width = '70px';
                ring.style.height = '70px';
                ring.style.background = 'rgba(0,0,0,0.03)';
                ring.style.borderColor = 'rgba(0,0,0,0.8)';
            });
            el.addEventListener('mouseleave', () => {
                ring.style.width = '40px';
                ring.style.height = '40px';
                ring.style.background = 'transparent';
                ring.style.borderColor = 'rgba(0,0,0,0.3)';
            });
        });

        /* =========================================
           TEXT SCRAMBLE EFFECT
        ========================================= */
        class TextScramble {
            constructor(el) {
                this.el = el;
                this.chars = '!<>-_\\\\/[]{}—=+*^?#________';
                this.update = this.update.bind(this);
            }
            setText(newText) {
                const oldText = this.el.innerText;
                const length = Math.max(oldText.length, newText.length);
                const promise = new Promise((resolve) => this.resolve = resolve);
                this.queue = [];
                for (let i = 0; i < length; i++) {
                    const from = oldText[i] || '';
                    const to = newText[i] || '';
                    const start = Math.floor(Math.random() * 40);
                    const end = start + Math.floor(Math.random() * 40);
                    this.queue.push({ from, to, start, end });
                }
                cancelAnimationFrame(this.frameRequest);
                this.frame = 0;
                this.update();
                return promise;
            }
            update() {
                let output = '';
                let complete = 0;
                for (let i = 0, n = this.queue.length; i < n; i++) {
                    let { from, to, start, end, char } = this.queue[i];
                    if (this.frame >= end) {
                        complete++;
                        output += to;
                    } else if (this.frame >= start) {
                        if (!char || Math.random() < 0.28) {
                            char = this.randomChar();
                            this.queue[i].char = char;
                        }
                        output += `<span class="dull">${char}</span>`;
                    } else {
                        output += from;
                    }
                }
                this.el.innerHTML = output;
                if (complete === this.queue.length) {
                    this.resolve();
                } else {
                    this.frameRequest = requestAnimationFrame(this.update);
                    this.frame++;
                }
            }
            randomChar() {
                return this.chars[Math.floor(Math.random() * this.chars.length)];
            }
        }

        /* =========================================
           INTERACTIONS & HOVER LOGIC
        ========================================= */
        const descText = document.getElementById('desc-text');
        const launchBtn = document.getElementById('launch-btn');
        const scrambler = new TextScramble(descText);
        let targetVelo = 0.0; // Drives shader distortion

        document.querySelectorAll('.list-item').forEach((item, index) => {
            item.addEventListener('mouseenter', () => {
                scrambler.setText(tools[index].desc);
                launchBtn.href = tools[index].url;
                launchBtn.style.opacity = 1;
                targetVelo = 1.5; // Spike WebGL distortion
            });
            
            item.addEventListener('mouseleave', () => {
                targetVelo = 0.0; // Return fluid to calm state
            });
        });

        /* =========================================
           SMOOTH SCROLL (LENIS)
        ========================================= */
        const lenis = new Lenis({
            duration: 1.5,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            direction: 'vertical',
            gestureDirection: 'vertical',
            smooth: true,
            mouseMultiplier: 1,
            smoothTouch: false,
            touchMultiplier: 2,
            infinite: false,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        /* =========================================
           WEBGL LIQUID PEARL SHADER
        ========================================= */
        const canvas = document.getElementById('glcanvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform float uTime;
            uniform vec2 uResolution;
            uniform vec2 uMouse;
            uniform float uVelo;
            varying vec2 vUv;

            // Simplex 2D noise implementation
            vec3 permute(vec3 x) { return mod(((x*34.0)+1.0)*x, 289.0); }
            float snoise(vec2 v){
              const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
              vec2 i  = floor(v + dot(v, C.yy) );
              vec2 x0 = v -   i + dot(i, C.xx);
              vec2 i1;
              i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
              vec4 x12 = x0.xyxy + C.xxzz;
              x12.xy -= i1;
              i = mod(i, 289.0);
              vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 )) + i.x + vec3(0.0, i1.x, 1.0 ));
              vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
              m = m*m ; m = m*m ;
              vec3 x = 2.0 * fract(p * C.www) - 1.0;
              vec3 h = abs(x) - 0.5;
              vec3 ox = floor(x + 0.5);
              vec3 a0 = x - ox;
              m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
              vec3 g;
              g.x  = a0.x  * x0.x  + h.x  * x0.y;
              g.yz = a0.yz * x12.xz + h.yz * x12.yw;
              return 130.0 * dot(m, g);
            }

            void main() {
                vec2 st = gl_FragCoord.xy / uResolution.xy;
                st.x *= uResolution.x / uResolution.y;

                vec2 mouse = uMouse;
                mouse.x *= uResolution.x / uResolution.y;
                
                // Mouse interaction distance
                float dist = distance(st, mouse);
                float interaction = exp(-dist * 4.0) * uVelo;

                // Fluid wave math
                vec2 q = vec2(0.0);
                q.x = snoise(st * 1.5 + uTime * 0.04);
                q.y = snoise(st * 1.5 + vec2(1.0));

                vec2 r = vec2(0.0);
                r.x = snoise(st * 2.0 + q * 2.5 + uTime * 0.08 + interaction * 0.6);
                r.y = snoise(st * 2.0 + q * 2.5 + uTime * 0.06 - interaction * 0.6);

                float f = snoise(st * 2.5 + r * 2.0);

                // High-End Liquid Pearl Palette
                vec3 basePearl = vec3(0.96, 0.97, 0.98); // very light silver/white
                vec3 silverShadow = vec3(0.82, 0.85, 0.88); // soft grey
                vec3 pureHighlight = vec3(1.0, 1.0, 1.0);

                vec3 color = mix(basePearl, silverShadow, clamp(f*f*1.8, 0.0, 1.0));
                color = mix(color, pureHighlight, clamp(length(q)*1.3, 0.0, 1.0));

                // Subtle Chromatic Iridescence embedded in shadows
                vec3 irid = vec3(
                    0.5 + 0.5 * cos(f * 6.0 + 0.0),
                    0.5 + 0.5 * cos(f * 6.0 + 2.0),
                    0.5 + 0.5 * cos(f * 6.0 + 4.0)
                );

                color = mix(color, irid, 0.02 + 0.08 * interaction);

                // Edge Vignette to frame the scene
                vec2 uvVig = gl_FragCoord.xy / uResolution.xy;
                float vignette = uvVig.x * uvVig.y * (1.0 - uvVig.x) * (1.0 - uvVig.y);
                vignette = clamp(pow(16.0 * vignette, 0.15), 0.0, 1.0);
                color *= vignette * 0.9 + 0.1;

                gl_FragColor = vec4(color, 1.0);
            }
        `;

        const geometry = new THREE.PlaneGeometry(2, 2);
        const material = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                uMouse: { value: new THREE.Vector2(0.5, 0.5) },
                uVelo: { value: 0.0 }
            },
            vertexShader,
            fragmentShader
        });

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        let glMouse = new THREE.Vector2(0.5, 0.5);
        let targetGlMouse = new THREE.Vector2(0.5, 0.5);
        let currentVelo = 0;

        window.addEventListener('mousemove', (e) => {
            targetGlMouse.x = e.clientX / window.innerWidth;
            targetGlMouse.y = 1.0 - (e.clientY / window.innerHeight); // Invert Y for GLSL
        });

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            material.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
        });

        const clockGL = new THREE.Clock();
        function animateGL() {
            const elapsedTime = clockGL.getElapsedTime();
            
            // Lerp mouse and velocity for buttery fluid interaction
            glMouse.lerp(targetGlMouse, 0.04);
            currentVelo += (targetVelo - currentVelo) * 0.05;

            material.uniforms.uTime.value = elapsedTime;
            material.uniforms.uMouse.value.copy(glMouse);
            material.uniforms.uVelo.value = currentVelo;

            renderer.render(scene, camera);
            requestAnimationFrame(animateGL);
        }
        animateGL();

        /* =========================================
           LOADER & INITIALIZATION SEQUENCE
        ========================================= */
        let progress = 0;
        const loaderPercent = document.querySelector('.loader-percent');
        const loader = document.querySelector('.loader');

        // Simulate asset loading
        const interval = setInterval(() => {
            progress += Math.floor(Math.random() * 8) + 1;
            if(progress >= 100) {
                progress = 100;
                clearInterval(interval);
                
                // GSAP Reveal Timeline
                setTimeout(() => {
                    gsap.to(loader, { yPercent: -100, duration: 1.4, ease: 'expo.inOut' });
                    
                    gsap.fromTo('.item-title', 
                        { y: 60, opacity: 0 }, 
                        { y: 0, opacity: 1, duration: 1.4, stagger: 0.06, ease: 'power4.out', delay: 0.5 }
                    );
                    
                    gsap.fromTo('.item-num', 
                        { opacity: 0 }, 
                        { opacity: 0.3, duration: 1, stagger: 0.06, ease: 'power2.out', delay: 0.7 }
                    );

                    gsap.fromTo('.nav-top', 
                        { y: -30, opacity: 0 }, 
                        { y: 0, opacity: 1, duration: 1.2, ease: 'power3.out', delay: 0.8 }
                    );

                    gsap.fromTo('#fixed-detail', 
                        { x: 40, opacity: 0 }, 
                        { x: 0, opacity: 1, duration: 1.2, ease: 'power3.out', delay: 1.0 }
                    );
                }, 200);
            }
            loaderPercent.innerText = progress.toString().padStart(3, '0');
        }, 30);

    </script>
</body>
</html>
